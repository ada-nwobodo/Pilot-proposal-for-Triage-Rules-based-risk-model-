services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - RISK_ENGINE_SPACY_MODEL=en_core_web_sm
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
